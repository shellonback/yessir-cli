# Yessir — local policy (deny-first defaults)
#
# Generated by `yessir init`. Edit freely; rules are reloaded every run.
#
# Precedence (highest to lowest):
#   1. deny           — never approved, even if also listed under allow
#   2. require_manual — always escalated to the user
#   3. destructive heuristics (chaining, substitution, sudo, rm -rf, curl|bash)
#   4. allow          — auto-approved
#   5. unknown        — ai mode routes to reviewer; quick/hybrid fall back to manual
#
# This default is "open by default, deny on a blocklist". If you want a strict
# allowlist instead, replace the `*` / `**` under `allow:` with explicit
# patterns.

mode: hybrid

allow:
  commands:
    - "*"
  read:
    - "**"
  write:
    - "**"

deny:
  commands:
    - rm -rf *
    - rm -fr *
    - rm -rf /
    - rm -rf /*
    - rm -rf ~
    - rm -rf ~/*
    - sudo *
    - git push --force *
    - git push -f *
    - curl * | bash
    - curl * | sh
    - curl * | zsh
    - wget * | bash
    - wget * | sh
    - wget * | zsh
    - npm publish
    - npm publish *
    - pnpm publish
    - pnpm publish *
    - yarn publish
    - yarn publish *
    - chmod -R 777 *
    - chmod 777 *
    - mkfs *
    - dd if=*
    - dd of=*
    - shutdown *
    - reboot
    - reboot *
    - halt
    - halt *
    # fork bomb
    - ":(){:|:&};:"

  write:
    # secrets & credentials — agents should NEVER rewrite these
    - .env
    - .env.*
    - "**/.env"
    - "**/.env.*"
    - "**/*.pem"
    - "**/*.key"
    - "**/*.p12"
    - "**/*.pfx"
    - "**/id_rsa"
    - "**/id_rsa.*"
    - "**/id_ed25519"
    - "**/id_ed25519.*"
    - "**/id_ecdsa"
    - "**/id_ecdsa.*"
    - .ssh/**
    - "**/.ssh/**"
    - "**/credentials"
    - "**/credentials.json"
    - "**/*.kdbx"
    # system files — agents should never touch these
    - /etc/**
    - /usr/**
    - /bin/**
    - /sbin/**
    - /System/**
    - /Library/**
    - ~/.aws/**
    - ~/.gcp/**
    - ~/.kube/**
    - ~/.docker/config.json

require_manual:
  commands:
    - git push
    - git push *
    - git tag *
    - git reset --hard
    - git reset --hard *
    - git clean -fd
    - git clean -fd *
    - git rebase *
    - git cherry-pick *
    - docker compose up *
    - docker compose down
    - docker compose down *
    - docker system prune *
    - npm install
    - npm install *
    - npm uninstall *
    - pnpm install
    - pnpm install *
    - pnpm uninstall *
    - yarn install
    - yarn install *
    - yarn remove *
    - brew install *
    - brew uninstall *
    - apt install *
    - apt-get install *
    - apt remove *
    - apt-get remove *

  write:
    # lock files: usually regenerated via install commands; flag direct edits
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock

ai_reply:
  enabled: true
  model: auto
  max_tail_lines: 300
  require_manual_on:
    - secrets
    - deployment
    - destructive_command
    - external_network_script
