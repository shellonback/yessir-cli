# Yessir — local policy
#
# Generated by `yessir init`. Edit freely; rules are reloaded every run.
#
# Precedence (highest to lowest):
#   1. deny           — never approved, even if also listed under allow
#   2. require_manual — always escalated to the user
#   3. destructive heuristics (rm -rf, sudo, curl | bash, shell metachars)
#   4. allow          — auto-approved
#   5. unknown        — ai mode routes to reviewer; quick/hybrid fall back to manual

mode: hybrid

allow:
  commands:
    - git status
    - git diff
    - git diff *
    - git log
    - git log *
    - git show *
    - npm test
    - npm run test
    - npm run test *
    - npm run lint
    - npm run build
    - pnpm test
    - pnpm lint
    - pnpm build
    - yarn test
    - yarn lint
    - yarn build
    - ls
    - ls *
    - pwd
    - node --version
    - npm --version

  read:
    - "**/*"

  write:
    # project code and asset dirs
    - src/**
    - app/**
    - lib/**
    - tests/**
    - test/**
    - __tests__/**
    - docs/**
    - scripts/**
    - bin/**
    - public/**
    - assets/**
    - content/**
    - types/**
    - .github/**
    # top-level docs and config files (adjust as needed)
    - "*.md"
    - "*.mdx"
    - "*.txt"
    - package.json
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml
    - tsconfig*.json
    - jest.config.*
    - vitest.config.*
    - vite.config.*
    - next.config.*
    - nuxt.config.*
    - astro.config.*
    - svelte.config.*
    - rollup.config.*
    - webpack.config.*
    - babel.config.*
    - .babelrc*
    - .eslintrc*
    - .prettierrc*
    - .editorconfig
    - .gitignore
    - .npmignore
    - .gitattributes
    - .nvmrc
    - .node-version
    - Dockerfile
    - Dockerfile.*
    - docker-compose*.yml
    - docker-compose*.yaml
    - .env.example
    - .env.sample

deny:
  commands:
    - rm -rf *
    - rm -fr *
    - rm -rf /
    - sudo *
    - git push --force *
    - git push -f *
    - curl * | bash
    - curl * | sh
    - wget * | bash
    - wget * | sh
    - npm publish
    - npm publish *
    - pnpm publish
    - pnpm publish *
    - chmod -R 777 *
    - mkfs *
    - dd *

require_manual:
  commands:
    - git push
    - git push *
    - git tag *
    - git reset --hard
    - git reset --hard *
    - docker compose up *
    - docker compose down
    - docker compose down *
    - npm install
    - npm install *
    - pnpm install
    - pnpm install *
    - yarn install
    - yarn install *

ai_reply:
  enabled: true
  model: auto
  max_tail_lines: 300
  require_manual_on:
    - secrets
    - deployment
    - destructive_command
    - external_network_script
