# Yessir — local policy
#
# Generated by `yessir init`. Edit freely; rules are reloaded every run.
#
# Precedence (highest to lowest):
#   1. deny           — never approved, even if also listed under allow
#   2. require_manual — always escalated to the user
#   3. destructive heuristics (rm -rf, sudo, curl | bash, shell metachars)
#   4. allow          — auto-approved
#   5. unknown        — ai mode routes to reviewer; quick/hybrid fall back to manual

mode: hybrid

allow:
  commands:
    - git status
    - git diff
    - git diff *
    - git log
    - git log *
    - git show *
    - npm test
    - npm run test
    - npm run test *
    - npm run lint
    - npm run build
    - pnpm test
    - pnpm lint
    - pnpm build
    - yarn test
    - yarn lint
    - yarn build
    - ls
    - ls *
    - pwd
    - node --version
    - npm --version

  read:
    - "**/*"

  write:
    - src/**
    - app/**
    - lib/**
    - tests/**
    - test/**
    - docs/**
    - README.md

deny:
  commands:
    - rm -rf *
    - rm -fr *
    - rm -rf /
    - sudo *
    - git push --force *
    - git push -f *
    - curl * | bash
    - curl * | sh
    - wget * | bash
    - wget * | sh
    - npm publish
    - npm publish *
    - pnpm publish
    - pnpm publish *
    - chmod -R 777 *
    - mkfs *
    - dd *

require_manual:
  commands:
    - git push
    - git push *
    - git tag *
    - git reset --hard
    - git reset --hard *
    - docker compose up *
    - docker compose down
    - docker compose down *
    - npm install
    - npm install *
    - pnpm install
    - pnpm install *
    - yarn install
    - yarn install *

ai_reply:
  enabled: true
  model: auto
  max_tail_lines: 300
  require_manual_on:
    - secrets
    - deployment
    - destructive_command
    - external_network_script
